<app-page-header title="Dashboard"></app-page-header>
<div class="grid grid-cols-12 gap-8 mt-4">

    <div class="col-span-12 lg:col-span-6 xl:col-span-3">
        <div class="gesil-card">
            <h2 class="text-xl font-bold">Residential Property</h2>
            <p class="amount mt-2 text-blue-500">417573</p>
            <!-- <p class="amount mt-2 text-blue-500">{{permissionService.hasPermission(3)}}</p> -->
        </div>
    </div>

    <div class="col-span-12 lg:col-span-6 xl:col-span-3">
        <div class="gesil-card">
            <h2 class="text-xl font-bold">Commercial Property</h2>
            <p class="amount mt-2 text-green-500">30025</p>
        </div>
    </div>

    <div class="col-span-12 lg:col-span-6 xl:col-span-3">
        <div class="gesil-card">
            <h2 class="text-xl font-bold">Mixed Property</h2>
            <p class="amount mt-2 text-orange-500">3449</p>
        </div>
    </div>
    <div class="col-span-12 lg:col-span-6 xl:col-span-3">
        <div class="gesil-card">
            <h2 class="text-xl font-bold">Vacant Property</h2>
            <p class="amount mt-2 text-orange-500">43</p>
        </div>
    </div>
</div>


<div class="grid grid-cols-12 gap-8 mt-4">
    <div class="col-span-12 lg:col-span-6 xl:col-span-6">
        <div class="gesil-card">
               <p-chart type="bar" [data]="barData" [options]="barOptions"></p-chart>
        </div>
    </div>
    <div class="col-span-12 lg:col-span-6 xl:col-span-6">
        <div class="gesil-card">
                <p-chart type="pie" [data]="pieData" [options]="pieOptions"></p-chart>
        </div>
    </div>
