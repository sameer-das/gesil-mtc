<div class="flex gap-2 items-center">
    <img src="assets/logo.png" alt="logo" class="logo_img" />
    <h1 class="brand-name text-center my-4">Ghaziabad Municipal Tax Collection</h1>
</div>


<div>
    <p-carousel [value]="images" [numVisible]="1" [numScroll]="1" [circular]="true" [autoplayInterval]="3000"
        styleClass="full-width-carousel">
        <ng-template pTemplate="item" let-image>
            <div class="carousel-item">
                <img [src]="image.src" [alt]="image.alt" class="carousel-img" />
                <div class="carousel-caption">
                    <h3>{{ image.title }}</h3>
                    <!-- <p>{{ image.description }}</p> -->
                     <button class="bg-green-500" >Explore</button>
                </div>
            </div>
        </ng-template>
    </p-carousel>
</div>

<div class="flex">

</div>
<div class="flex flex-col sm:flex-row mt-8 gap-4">

    <section class="flex-1 flex justify-center items-center">
        <div class="gesil-card about-us">
            <h1 class="text-xl font-semibold mb-4" style=" color: var(--primary-color)">We deal with</h1>
            <p class="mb-4 ml-4 bg-green-200 font-medium py-2 px-4 rounded">Property Tax</p>
            <p class="mb-4 ml-4 bg-green-200 font-medium py-2 px-4 rounded">Property Survey</p>
            <p class="mb-4 ml-4 bg-green-200 font-medium py-2 px-4 rounded">User Charge</p>
            <p class="mb-4 ml-4 bg-green-200 font-medium py-2 px-4 rounded">Water Charge</p>
            <p class="mb-4 ml-4 bg-green-200 font-medium py-2 px-4 rounded">Trade License</p>
            <p class="mb-4 ml-4 bg-green-200 font-medium py-2 px-4 rounded">Adverteisment</p>

        </div>
    </section>
    <section class="flex-1 flex justify-center items-center">
        <div class="gesil-card flex flex-col login-box">

            <h1 class="text-xl font-semibold login-header text-center">Agent Login</h1>

            <form class="flex flex-col mt-8 gap-8" #f="ngForm" (ngSubmit)="login(f)">
                <div class="w-full">
                    <p-floatlabel variant="on">
                        <input required="true" pInputText id="username" [(ngModel)]="username" name="username"
                            autocomplete="off" fluid="true" />
                        <label for="username">Username</label>
                    </p-floatlabel>
                </div>

                <div class="w-full">
                    <p-floatlabel variant="on">
                        <p-password required="true" id="password" [(ngModel)]="password" name="password"
                            [feedback]="false" fluid="true" [toggleMask]="true" />
                        <label for="password">Password</label>
                    </p-floatlabel>
                </div>

                <p-button fluid="true" [disabled]="f.invalid" type="submit">Login</p-button>
                <a class="text-center" href="/login">Forgot Credential</a>
            </form>

        </div>
    </section>
</div>
