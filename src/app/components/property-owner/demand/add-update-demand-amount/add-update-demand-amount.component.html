<app-page-header [backButton]="true" title="Add New Demand Details"></app-page-header>

<div class="gesil-card mt-4">
    <form [formGroup]="demandForm" class="mt-4">

        <div class="mt-4 flex flex-col gap-4 items-center justify-center">
            <div class="flex flex-wrap gap-2 w-full md:w-1/3">
                <label for="fy">Financial Year</label>
                <p-select id="fy" [options]="fys" optionLabel="fyName" placeholder="Select Financial Year"
                    class="w-full" formControlName="fy"></p-select>
                <div class="text-red-500 text-xs" [class.invisible]="!isInvalid('fy')">
                    @if(demandForm.get('fy')?.hasError('required')) {
                        Please choose financial year.
                    } 
                    @else if (demandForm.get('fy')?.hasError('fyid')) {
                        Demand for this financial year already exists for property.
                    }

                </div>
            </div>

            <div class="flex flex-wrap gap-2 w-full md:w-1/3">
                <label for="dueFromPrevYear">Due from previous year</label>
                <input pInputText class="w-full" id="dueFromPrevYear" placeholder="Due from previous year" type="text"
                    formControlName="dueFromPrevYear" />
            </div>

            <div class="flex flex-wrap gap-2 w-full md:w-1/3">
                <label for="currentFyAmount">Current year due</label>
                <input pInputText class="w-full" id="currentFyAmount" placeholder="Current year due" type="text"
                    formControlName="currentFyAmount" />
            </div>

            <div class="w-full md:w-1/3">
                <p-button label="Add Demand" styleClass="w-full" (click)="onDemandAdd()" [disabled]="demandForm.invalid" />
            </div>
        </div>
    </form>
</div>
