<app-page-header title="Usage Types" />

<div class="bg-card rounded-lg p-4 mt-4">
    <p-table [value]="usageTypes" dataKey="categoryId" [rows]="TABLE_CONFIG.rows" [rowHover]="TABLE_CONFIG.rowHover"
        [showGridlines]="TABLE_CONFIG.showGridlines" [paginator]="TABLE_CONFIG.paginator"
        responsiveLayout="TABLE_CONFIG.responsiveLayout" [rowsPerPageOptions]="TABLE_CONFIG.rowsPerPageOptions"
        [totalRecords]="totalRecords" [lazy]="true" (onPage)="onPaginate($event)">
        <ng-template #caption>


            <div class="flex justify-between items-center flex-column sm:flex-row">
                <!-- <div class="">
                    <p-iconfield>
                        <p-inputicon styleClass="pi pi-search" />
                        <input type="text" pInputText placeholder="Search Category" [formControl]="search" />
                    </p-iconfield>
                </div> -->
                
                <a [routerLink]="['../','usage-type-create']" class="p-button ml-auto">
                    <i class="pi pi-plus-circle"></i>Add New Usage Type
                </a>
            </div>
        </ng-template>

        <ng-template #header>
            <tr>
                <th style="min-width: 12rem">
                    <div class="flex justify-between items-center">
                        Sl No
                    </div>
                </th>
                <th style="min-width: 12rem">
                    <div class="flex justify-between items-center">
                        Category Name
                    </div>
                </th>
                <th style="min-width: 12rem">
                    <div class="flex justify-between items-center">
                        Charges Per Month
                    </div>
                </th>
                <th style="min-width: 12rem">
                    <div class="flex justify-between items-center">
                        Charges Per Year
                    </div>
                </th>
                <th style="min-width: 12rem">
                    <div class="flex justify-between items-center">
                        Action
                    </div>
                </th>
            </tr>
        </ng-template>


        <ng-template #body let-item let-index="rowIndex">
            <tr>
                <td>
                    {{ index + 1 }}
                </td>
                <td>
                    {{ item.usageTypeName }}
                </td>
                <td>
                    {{ item.chargesPerMonth }}
                </td>
                <td>
                    {{ item.chargesPerYear }}
                </td>
                <td>
                    <a pButton icon="pi pi-pencil" [routerLink]="['../', 'usage-type-edit', item.usageTypeId]"
                        [rounded]="true" class="mr-2" severity="help" pTooltip="Edit"></a>
                    <!-- <a pButton icon="pi pi-eye" [rounded]="true" class="mr-2"
                        [routerLink]="['../','category-details', item.categoryId]" pTooltip="View"></a> -->
                </td>

            </tr>
        </ng-template>
    </p-table>
</div>
